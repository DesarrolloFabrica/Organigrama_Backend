services:
  postgres:
    image: postgres:16-alpine
    container_name: organigrama-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: organigrama
    ports:
      - '5432:5432'
    volumes:
      - organigrama_pgdata:/var/lib/postgresql/data

volumes:
  organigrama_pgdata:
